name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest flake8

      - name: Lint
        run: flake8 . --max-line-length=120 --exclude=.git,tests

      - name: Run tests
        run: pytest tests/